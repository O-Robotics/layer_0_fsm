###############################################################################
# RUNNING - Profiles
#
# Valid profile range: 200 - 299
###############################################################################

profiles:
  # ---------------------------------------------------------------------------
  # Profile 200 (FSM tester) 
  # ---------------------------------------------------------------------------
  - profile:
      id: 200
      transitions:
        auto_transition_on: false
        auto_transition_profile: 
        fault_transition_on: true
        fault_transition_profile: 400

      processes: 
         # Logic block: FSM tester node (critical)
        - name: "fsm_tester"
          importance: "critical"
          startup:
            exec: "ros2 run amr_sweeper_layer_0_fsm fsm_tester_node"
            args:
              - "--ros-args"
              - "-r __ns:=/amr_sweeper"
            ready:
              - type: "topic"
                target: "/amr_sweeper/fsm_tester"
                required: true
              - type: "service"
                target: "/amr_sweeper/fsm_tester_node/apply_parameters"
                required: true
            window_ms: 5000
          rosout_triggers:
            - "node=fsm_tester_node;level>=ERROR;action=FAULT"
            - "node=fsm_tester_node_node;level>=WARN;action=DEGRADED"
          errors:
            on_readiness_fail: "FAULT"
            on_unexpected_exit: "FAULT"
            priority: 250
            force: true
          restart:
            max_restarts: 5
            restart_delay_ms: 1000
          shutdown:
            sigint_timeout_ms: 1000
            sigterm_timeout_ms: 1000
            sigkill_timeout_ms: 1000


  # ---------------------------------------------------------------------------
  # Profile 201 (default)
  # ---------------------------------------------------------------------------
  - profile:
      id: 201
      transitions:
        auto_transition_on: false
        auto_transition_profile: 
        fault_transition_on: true
        fault_transition_profile: 400

      processes: 
       # Logic block: layer_1_hardware bringup (critical)
        - name: "amr_sweeper_layer_1_hardware_bringup"
          importance: "critical"
          startup:
            exec: "ros2 launch amr_sweeper_layer_1_hardware_bringup amr_sweeper_layer_1_hardware_bringup.launch.py"
            args:
              - "robot_namespace:=amr_sweeper"
              - "use_battery_node:=true"
              - "use_system_info_node:=true"
              - "use_usb_cameras:=true"
            ready:
              - type: "topic"
                target: "/amr_sweeper/system_info"
                required: true
              - type: "service"
                target: "/amr_sweeper/amr_sweeper_battery_node/get_parameters"
                required: true
            window_ms: 8000
          rosout_triggers:
            - "node=amr_sweeper_system_info_node;level>=ERROR;action=FAULT"
            - "node=amr_sweeper_system_info_node;level>=WARN;action=DEGRADED"
            - "node=amr_sweeper_system_info_node;match=Could not open file;action=FAULT"
            - "node=amr_sweeper_battery_node;level>=ERROR;action=FAULT"
            - "node=amr_sweeper_battery_node;level>=WARN;action=DEGRADED"
            - "level>=ERROR;match=Failed to open V4L2 device;action=FAULT"
          errors:
            on_readiness_fail: "FAULT"
            on_unexpected_exit: "FAULT"
            priority: 250
            force: true
          restart:
            max_restarts: 5
            restart_delay_ms: 1000
          shutdown:
            sigint_timeout_ms: 1000
            sigterm_timeout_ms: 1000
            sigkill_timeout_ms: 1000

        # Logic block: layer_2_controllers bringup (critical)
        - name: "amr_sweeper_layer_2_controllers_bringup"
          importance: "critical"
          startup:
            exec: "ros2 launch amr_sweeper_layer_2_controllers_bringup amr_sweeper_layer_2_controllers_bringup.launch.py"
            args:
              - "namespace:=amr_sweeper"
              - "use_joystick:=false"
              - "use_twist_mux:=true"
              - "use_wheel_controller:=true"
              - "use_tool_controller:=true"
            ready:
              - type: "topic"
                target: "/amr_sweeper/cmd_vel"
                required: true
              - type: "topic"
                target: "/amr_sweeper/controller_steadydrive/commands"
                required: true
            window_ms: 8000
          rosout_triggers:
            - "level>=FATAL;action=FAULT"
            - "level>=ERROR;action=FAULT"
          errors:
            on_readiness_fail: "FAULT"
            on_unexpected_exit: "FAULT"
            priority: 250
            force: true
          restart:
            max_restarts: 0
            restart_delay_ms: 1000
          shutdown:
            sigint_timeout_ms: 1500
            sigterm_timeout_ms: 1500
            sigkill_timeout_ms: 1500

        # Logic block: layer_3_navigation bringup (degraded)
        - name: "amr_sweeper_layer_3_navigation_bringup"
          importance: "degraded"
          startup:
            exec: "ros2 launch amr_sweeper_layer_3_navigation_bringup amr_sweeper_layer_3_navigation_bringup.launch.py"
            args:
              - "namespace:=amr_sweeper"
              - "use_sim_time:=false"
              - "use_localization:=true"
              - "use_navigation:=true"
            ready:
              - type: "topic"
                target: "/amr_sweeper/odometry/global"
                required: true
              - type: "service"
                target: "/amr_sweeper/controller_server/get_state"
                required: true
            window_ms: 15000
          rosout_triggers:
            - "level>=FATAL;action=FAULT"
            - "level>=ERROR;action=FAULT"
          errors:
            on_readiness_fail: "DEGRADED"
            on_unexpected_exit: "DEGRADED"
            priority: 230
            force: false
          restart:
            max_restarts: 5
            restart_delay_ms: 1000
          shutdown:
            sigint_timeout_ms: 2000
            sigterm_timeout_ms: 2000
            sigkill_timeout_ms: 2000

        # Logic block: joystick (optional)
        - name: "joystick"
          importance: "optional"
          startup:
            exec: "ros2 launch amr_sweeper_joystick joystick.launch.py"
            args:
              - "namespace:=amr_sweeper"
              - "joy_dev:=/dev/input/js0"
            ready:
              - type: "topic"
                target: "/amr_sweeper/joy"
                required: false
            window_ms: 8000
          rosout_triggers:
            - "level>=FATAL;action=FAULT"
            - "level>=ERROR;action=DEGRADED"
          errors:
            on_readiness_fail: "DEGRADED"
            on_unexpected_exit: "DEGRADED"
            priority: 200
            force: false
          restart:
            max_restarts: 5
            restart_delay_ms: 1000
          shutdown:
            sigint_timeout_ms: 1500
            sigterm_timeout_ms: 1500
            sigkill_timeout_ms: 1500

 
